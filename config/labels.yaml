# Label specification (§6). The barriers ARE the strategy (invariant I3).
# Purge/embargo are DERIVED from this horizon downstream and are intentionally not
# configurable here (§7).
version: "2026.07.14-eventbar"
method: "triple_barrier"
barrier_sigma_multiple_k: 2.0      # +/- k * sigma horizontal barriers
vertical_barrier_bars_h: 30        # timeout horizon, in bars (wall-clock minutes)

volatility:                        # time-of-day-bucketed causal EWMA (ADR-0007; §6)
  method: "time_of_day_ewma"
  bucket_minutes: 30               # intraday bucket size; open-hour != midday (separate buckets)
  ewma_span_days: 20               # EWMA span over PAST days of same-bucket realized variance
