# IBKR gateway/TWS connection and pacing.
# Connection fields are operational. request_timezone is result-affecting and required:
# it is pinned on every historical request so session tagging is DST-correct (§5).
host: "127.0.0.1"
port: 7497            # 7497 = TWS paper, 7496 = TWS live, 4002/4001 = IB Gateway
client_id: 7
account: null
connect_timeout_seconds: 30.0
read_only: true       # research sessions must never place orders

request_timezone: "America/New_York"   # pinned per request; bars are stored in UTC

# Pacing (§5): <=60 historical requests / 10 min; BID_ASK counts double.
max_requests_per_10min: 60
chunk_size_bars: 2000
bid_ask_counts_double: true
